# ─────────────────────────────────────────────────────────────────────
# This nginx sits behind Synology DSM's reverse proxy (TLS termination).
#
# HTTP→HTTPS redirect is handled by DSM's nginx directly (see
# synology-boot.sh which installs a redirect server block).
# ─────────────────────────────────────────────────────────────────────

server {
    listen 80;

    # Serve Vue static assets with long-term caching
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API, video, and image routes to FastAPI
    location ~ ^/(api|video|video-thumb|image)/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Support large video downloads and image uploads
        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 25m;
    }

    # Vue Router history mode — all other routes serve index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
